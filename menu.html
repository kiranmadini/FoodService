         }

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const addToCartButtons = document.querySelectorAll('.add');
            addToCartButtons.forEach(button => {
                button.addEventListener('click', addToCartClicked);
            });

            function addToCartClicked(event) {
                const button = event.target;
                const name = button.getAttribute('dname');
                const price = button.getAttribute('dprice');
                const image = button.getAttribute('dimage');
                addItemToCart(name, price, image);

                // Replace button with tick mark
                const tickMark = document.createElement('div');
                tickMark.classList.add('tick-mark');
                tickMark.innerHTML = '&#10003;'; // Unicode for check mark
                button.parentNode.replaceChild(tickMark, button);
            }

            function addItemToCart(name, price, image) {
                let cartItem = {
                    name: name,
                    price: price,
                    image: image
                };
                // Store the item in local storage
                let cart = JSON.parse(sessionStorage.getItem('cart')) || [];
                cart.push(cartItem);
                sessionStorage.setItem('cart', JSON.stringify(cart));
            }
        });
    </script>
